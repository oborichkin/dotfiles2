[window]
padding = { x = 8, y = 8 }
dynamic_padding = true

[shell]
program = "/usr/bin/zsh"

[scrolling]
multiplier = 3

[font]
size = 11.0

[bell]
animation = "EaseOutExpo"
duration = 0
color = "0xffffff"

[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\\t"
save_to_clipboard = true

[cursor]
style = { shape = "Block", blinking = "On" }
vi_mode_style = { shape = "Block" }
blink_interval = 750
blink_timeout = 5
unfocused_hollow = true

[mouse]
hide_when_typing = false
