# Alacritty configuration

# Import any additional configuration files (optional)
# import:
#   - /path/to/extra/config.yml

# Window configuration
window:
  # Window dimensions (in columns and lines, not pixels)
  dimensions:
    columns: 100
    lines: 30

  # Window padding (in pixels)
  padding:
    x: 8
    y: 8

  # Spread additional padding evenly around the terminal content
  dynamic_padding: true

  # Window decorations
  decorations: full

  # Startup mode
  startup_mode: Windowed

  # Window title
  title: Alacritty

  # Allow terminal applications to change Alacritty's window title
  dynamic_title: true

  # Window class (for Wayland)
  class:
    instance: Alacritty
    general: Alacritty

# Scrolling configuration
scrolling:
  # Maximum number of lines in the scrollback buffer
  history: 10000

  # Number of lines scrolled for every scroll wheel step
  multiplier: 3

# Font configuration
font:
  # Normal (roman) font face
  normal:
    family: "CaskaydiaCove Nerd Font Mono"
    style: Regular

  # Bold font face
  bold:
    family: "CaskaydiaCove Nerd Font Mono"
    style: Bold

  # Italic font face
  italic:
    family: "CaskaydiaCove Nerd Font Mono"
    style: Italic

  # Bold italic font face
  bold_italic:
    family: "CaskaydiaCove Nerd Font Mono"
    style: Bold Italic

  # Point size
  size: 11.0

# Colors (Gruvbox Dark theme)
colors:
  # Default colors
  primary:
    background: '0x282828'
    foreground: '0xebdbb2'

  # Normal colors
  normal:
    black:   '0x282828'
    red:     '0xcc241d'
    green:   '0x98971a'
    yellow:  '0xd79921'
    blue:    '0x458588'
    magenta: '0xb16286'
    cyan:    '0x689d6a'
    white:   '0xa89984'

  # Bright colors
  bright:
    black:   '0x928374'
    red:     '0xfb4934'
    green:   '0xb8bb26'
    yellow:  '0xfabd2f'
    blue:    '0x83a598'
    magenta: '0xd3869b'
    cyan:    '0x8ec07c'
    white:   '0xebdbb2'

  # Indexed colors
  indexed_colors:
    - { index: 16, color: '0xfe8019' }
    - { index: 17, color: '0xd65d0e' }
    - { index: 18, color: '0x3c3836' }
    - { index: 19, color: '0x504945' }
    - { index: 20, color: '0xbdae93' }
    - { index: 21, color: '0xebdbb2' }

# Bell configuration
bell:
  animation: EaseOutExpo
  duration: 0
  color: '0xffffff'

# Selection configuration
selection:
  # This string contains all characters that are used as separators for
  # "semantic words" in Alacritty
  semantic_escape_chars: ",│`|:\"' ()[]{}<>\\t"

  # When set to true, selected text will be copied to the primary clipboard
  save_to_clipboard: true

# Cursor configuration
cursor:
  # Cursor style
  style: { shape: Block, blinking: On }

  # Vi mode cursor style
  vi_mode_style: { shape: Block }

  # Cursor blinking interval in milliseconds
  blink_interval: 750

  # Time after which cursor stops blinking (in seconds)
  blink_timeout: 5

  # If true, the cursor will be rendered as a hollow box when the window is
  # not focused
  unfocused_hollow: true

# Mouse configuration
mouse:
  # Hide cursor when typing
  hide_when_typing: false

